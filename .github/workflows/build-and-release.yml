name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26.2'

      - name: Download dependencies
        run: go mod download && go mod tidy

      - name: Build executable
        run: go build -o janus-bot ./cmd/bot

      - name: Create .env file with secrets
        run: |
          cat > janus-bot.env << 'EOF'
          POLYMARKET_API_KEY=${{ secrets.POLYMARKET_API_KEY }}
          POLYMARKET_PRIVATE_KEY=${{ secrets.POLYMARKET_PRIVATE_KEY }}
          MARKET_FETCH_INTERVAL_MS=${{ secrets.MARKET_FETCH_INTERVAL_MS || '5000' }}
          PAPER_TRADING_ENABLED=${{ secrets.PAPER_TRADING_ENABLED || 'true' }}
          EOF
          
          ls -la janus-bot.env

      - name: Create startup script (Linux/Mac)
        run: |
          cat > start-janus-bot.sh << 'EOF'
          #!/bin/bash
          # Load environment variables from .env file if it exists
          if [ -f "./janus-bot.env" ]; then
              export $(cat janus-bot.env | xargs)
          fi
          
          # Run the bot
          ./janus-bot
          EOF
          chmod +x start-janus-bot.sh

      - name: Create startup script (Windows)
        run: |
          cat > start-janus-bot.ps1 << 'EOF'
          # Load environment variables from .env file if it exists
          if (Test-Path "./janus-bot.env") {
              $envVars = Get-Content "./janus-bot.env" | Where-Object { $_ -and -not $_.StartsWith('#') }
              foreach ($line in $envVars) {
                  $key, $value = $line -split '=', 2
                  [Environment]::SetEnvironmentVariable($key.Trim(), $value.Trim(), "Process")
              }
          }
          
          # Run the bot
          .\janus-bot.exe
          EOF

      - name: Create release artifacts
        run: |
          mkdir -p release-artifacts
          cp janus-bot release-artifacts/
          cp start-janus-bot.sh release-artifacts/
          cp start-janus-bot.ps1 release-artifacts/
          cp README.md release-artifacts/
          
          echo "=== Contents of release-artifacts ==="
          ls -la release-artifacts/

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: v${{ github.run_number }}-${{ github.sha }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
          artifacts: "release-artifacts/janus-bot,release-artifacts/start-janus-bot.sh,release-artifacts/start-janus-bot.ps1,release-artifacts/README.md"
          artifactErrorsFailBuild: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: janus-bot-build
          path: release-artifacts/
          retention-days: 30

  build-cross-platform:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
        exclude:
          # Darwin (macOS) doesn't support ARM64 on AMD64 runners for cross-compilation easily
          # Windows ARM64 is less common, exclude for now
          - os: windows
            arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26.2'

      - name: Download dependencies
        run: go mod download

      - name: Build for ${{ matrix.os }}/${{ matrix.arch }}
        run: |
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -o janus-bot-${{ matrix.os }}-${{ matrix.arch }} ./cmd/bot
        env:
          CGO_ENABLED: 0

      - name: Upload cross-platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: janus-bot-${{ matrix.os }}-${{ matrix.arch }}
          path: janus-bot-${{ matrix.os }}-${{ matrix.arch }}
          retention-days: 30

  deploy:
    needs: [build, build-cross-platform]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: janus-bot-build
          path: ./release-artifacts

      - name: Download cross-platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./cross-platform-artifacts

      - name: Verify downloaded artifacts
        run: |
          echo "=== Files in release-artifacts ==="
          ls -la release-artifacts/
          
          # Verify essential files are present
          for file in janus-bot start-janus-bot.sh README.md; do
            if [ ! -f "release-artifacts/$file" ]; then
              echo "ERROR: $file NOT FOUND in release-artifacts"
              exit 1
            fi
          done
          echo "All essential files present"
          
          echo ""
          echo "=== Cross-platform binaries available ==="
          ls -la cross-platform-artifacts/

      - name: Install SSH client and sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-client sshpass

      - name: Detect target machine architecture
        id: detect-arch
        run: |
          # First, list what binaries are available
          echo "=== Available cross-platform binaries ==="
          find cross-platform-artifacts -type f -name "janus-bot-*" | sort
          
          echo ""
          echo "=== Detecting target machine architecture via SSH ==="
          
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USERNAME@$SSH_HOST << 'EOF' > machine-info.txt
          # Detect machine architecture and info
          echo "=== Machine Architecture Detection ==="
          echo "Hostname: $(uname -n)"
          echo "Kernel: $(uname -s)"
          echo "Hardware: $(uname -m)"
          echo "Processor: $(uname -p 2>/dev/null || echo 'N/A')"
          
          # Detect if Raspberry Pi
          if [ -f /proc/device-tree/model ]; then
            DEVICE_MODEL=$(cat /proc/device-tree/model 2>/dev/null || echo "Unknown")
            echo "Device Model: $DEVICE_MODEL"
            if echo "$DEVICE_MODEL" | grep -q "Raspberry Pi"; then
              echo "Device: Raspberry Pi"
            else
              echo "Device: Generic Linux"
            fi
          else
            echo "Device: Generic Linux (no device-tree)"
          fi
          
          # Get architecture for binary selection
          ARCH=$(uname -m)
          echo "Raw Architecture: $ARCH"
          
          if [ "$ARCH" = "aarch64" ]; then
            echo "DETECTED_ARCH=arm64"
          elif [ "$ARCH" = "armv7l" ]; then
            echo "DETECTED_ARCH=arm (WARNING: only arm64 builds available)"
          elif [ "$ARCH" = "x86_64" ]; then
            echo "DETECTED_ARCH=amd64"
          else
            echo "DETECTED_ARCH=unknown"
          fi
          EOF
          
          cat machine-info.txt
          
          # Parse architecture from output
          if grep -q "DETECTED_ARCH=arm64" machine-info.txt; then
            echo "TARGET_ARCH=arm64" >> $GITHUB_OUTPUT
            echo "TARGET_OS=linux" >> $GITHUB_OUTPUT
            echo "Detected: ARM64 (Raspberry Pi or ARM64 system)"
          elif grep -q "DETECTED_ARCH=amd64" machine-info.txt; then
            echo "TARGET_ARCH=amd64" >> $GITHUB_OUTPUT
            echo "TARGET_OS=linux" >> $GITHUB_OUTPUT
            echo "Detected: AMD64 (x86_64 system)"
          else
            echo "WARNING: Could not reliably detect architecture"
            echo "TARGET_ARCH=arm64" >> $GITHUB_OUTPUT
            echo "TARGET_OS=linux" >> $GITHUB_OUTPUT
            echo "Defaulting to: ARM64 (recommended for Raspberry Pi)"
          fi
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}

      - name: Select appropriate binary for target architecture
        id: select-binary
        run: |
          TARGET_ARCH="${{ steps.detect-arch.outputs.TARGET_ARCH }}"
          TARGET_OS="${{ steps.detect-arch.outputs.TARGET_OS }}"
          
          echo "=== Binary Selection ==="
          echo "Target Architecture: $TARGET_ARCH"
          echo "Target OS: $TARGET_OS"
          
          # List all available binaries
          echo ""
          echo "Available cross-platform binaries:"
          find cross-platform-artifacts -type f -name "janus-bot-*" | sort
          
          # Try to find the binary with different path patterns
          # Artifacts are stored in subdirectories like janus-bot-linux-arm64/janus-bot-linux-arm64
          BINARY_PATH="cross-platform-artifacts/janus-bot-$TARGET_OS-$TARGET_ARCH/janus-bot-$TARGET_OS-$TARGET_ARCH"
          
          if [ -f "$BINARY_PATH" ]; then
            echo "✓ Found binary at: $BINARY_PATH"
            cp "$BINARY_PATH" release-artifacts/janus-bot-platform-specific
            chmod +x release-artifacts/janus-bot-platform-specific
            echo "BINARY_SOURCE=platform-specific" >> $GITHUB_OUTPUT
          else
            # Try finding it without the directory prefix
            ALT_BINARY=$(find cross-platform-artifacts -type f -name "janus-bot-$TARGET_OS-$TARGET_ARCH" | head -1)
            if [ -n "$ALT_BINARY" ] && [ -f "$ALT_BINARY" ]; then
              echo "✓ Found binary at: $ALT_BINARY"
              cp "$ALT_BINARY" release-artifacts/janus-bot-platform-specific
              chmod +x release-artifacts/janus-bot-platform-specific
              echo "BINARY_SOURCE=platform-specific" >> $GITHUB_OUTPUT
            else
              echo "⚠ WARNING: Could not find platform-specific binary"
              echo "Searched for: $BINARY_PATH"
              echo "Using default binary from build job (WARNING: May not be compatible!)"
              echo "BINARY_SOURCE=default-fallback" >> $GITHUB_OUTPUT
            fi
          fi
          
          # Always verify the binary exists before proceeding
          if [ -f "release-artifacts/janus-bot-platform-specific" ]; then
            echo "✓ Binary ready for upload: release-artifacts/janus-bot-platform-specific"
            file release-artifacts/janus-bot-platform-specific
          elif [ -f "release-artifacts/janus-bot" ]; then
            echo "Using fallback binary: release-artifacts/janus-bot"
            file release-artifacts/janus-bot
          else
            echo "ERROR: No binary available for upload!"
            exit 1
          fi

      - name: Create bot directory on server
        run: |
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USERNAME@$SSH_HOST "mkdir -p ~/janus-bot"
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}

      - name: Upload bot binary to server
        run: |
          # Always prefer platform-specific binary if available
          if [ -f "release-artifacts/janus-bot-platform-specific" ]; then
            BINARY_FILE="release-artifacts/janus-bot-platform-specific"
            BINARY_SOURCE="${{ steps.select-binary.outputs.BINARY_SOURCE }}"
            echo "Uploading platform-specific binary ($BINARY_SOURCE) for ${{ steps.detect-arch.outputs.TARGET_ARCH }}"
          elif [ -f "release-artifacts/janus-bot" ]; then
            BINARY_FILE="release-artifacts/janus-bot"
            echo "WARNING: Uploading default binary (may not be compatible with target architecture!)"
          else
            echo "ERROR: No binary found to upload!"
            exit 1
          fi
          
          echo "Binary file: $BINARY_FILE"
          file "$BINARY_FILE"
          
          sshpass -p "$SSH_PASSWORD" scp -o StrictHostKeyChecking=no -P $SSH_PORT "$BINARY_FILE" $SSH_USERNAME@$SSH_HOST:~/janus-bot/janus-bot
          echo "✓ Binary uploaded successfully"
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}

      - name: Make bot binary executable
        run: |
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USERNAME@$SSH_HOST "chmod +x ~/janus-bot/janus-bot"
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}

      - name: Upload startup scripts to server
        run: |
          sshpass -p "$SSH_PASSWORD" scp -o StrictHostKeyChecking=no -P $SSH_PORT release-artifacts/start-janus-bot.sh $SSH_USERNAME@$SSH_HOST:~/janus-bot/start-janus-bot.sh
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}

      - name: Make startup script executable
        run: |
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USERNAME@$SSH_HOST "chmod +x ~/janus-bot/start-janus-bot.sh"
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}

      - name: Create .env file on server with secrets
        run: |
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USERNAME@$SSH_HOST << 'SSH_SCRIPT'
          cat > ~/janus-bot/.env << 'EOF'
          POLYMARKET_API_KEY=${{ secrets.POLYMARKET_API_KEY }}
          POLYMARKET_PRIVATE_KEY=${{ secrets.POLYMARKET_PRIVATE_KEY }}
          MARKET_FETCH_INTERVAL_MS=${{ secrets.MARKET_FETCH_INTERVAL_MS || '5000' }}
          PAPER_TRADING_ENABLED=${{ secrets.PAPER_TRADING_ENABLED || 'true' }}
          EOF
          SSH_SCRIPT
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}

      - name: Kill existing bot screen session (if running)
        run: |
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USERNAME@$SSH_HOST "screen -S janus-bot -X quit 2>/dev/null || true"
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}

      - name: Start bot in screen session
        run: |
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USERNAME@$SSH_HOST "cd ~/janus-bot && screen -d -m -S janus-bot ./start-janus-bot.sh"
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}

      - name: Verify deployment
        run: |
          sleep 3
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USERNAME@$SSH_HOST << 'EOF'
          echo "=== Checking screen sessions ==="
          screen -ls || echo "No screen sessions running (this is OK if bot is starting)"
          
          echo ""
          echo "=== Files in janus-bot directory ==="
          ls -la ~/janus-bot/
          
          echo ""
          echo "=== Checking for process logs ==="
          if [ -f ~/janus-bot/screen.log ]; then
            echo "Screen log exists:"
            head -30 ~/janus-bot/screen.log
          else
            echo "No screen.log yet"
          fi
          
          echo ""
          echo "=== Checking if janus-bot binary is executable ==="
          file ~/janus-bot/janus-bot
          ls -la ~/janus-bot/janus-bot
          
          echo ""
          echo "=== Checking running processes ==="
          ps aux | grep -i janus || echo "No janus processes found"
          
          echo ""
          echo "Deployment verification complete"
          EOF
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
