name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26.2'

      - name: Download dependencies
        run: go mod download && go mod tidy

      - name: Build executable
        run: go build -o janus-bot ./cmd/bot

      - name: Create .env example file
        run: |
          cat > .env.example << 'EOF'
          # Polymarket API Configuration
          POLYMARKET_API_KEY=your_api_key_here
          POLYMARKET_PRIVATE_KEY=your_private_key_here
          
          # Market Configuration
          MARKET_FETCH_INTERVAL_MS=5000
          
          # Trading Configuration
          PAPER_TRADING_ENABLED=true
          EOF
          
          ls -la .env.example
          echo "=== Contents of .env.example ==="
          cat .env.example

      - name: Create .env file with secrets
        run: |
          cat > janus-bot.env << 'EOF'
          POLYMARKET_API_KEY=${{ secrets.POLYMARKET_API_KEY }}
          POLYMARKET_PRIVATE_KEY=${{ secrets.POLYMARKET_PRIVATE_KEY }}
          MARKET_FETCH_INTERVAL_MS=${{ secrets.MARKET_FETCH_INTERVAL_MS || '5000' }}
          PAPER_TRADING_ENABLED=${{ secrets.PAPER_TRADING_ENABLED || 'true' }}
          EOF
          
          ls -la janus-bot.env

      - name: Create startup script (Linux/Mac)
        run: |
          cat > start-janus-bot.sh << 'EOF'
          #!/bin/bash
          # Load environment variables from .env file if it exists
          if [ -f "./janus-bot.env" ]; then
              export $(cat janus-bot.env | xargs)
          fi
          
          # Run the bot
          ./janus-bot
          EOF
          chmod +x start-janus-bot.sh

      - name: Create startup script (Windows)
        run: |
          cat > start-janus-bot.ps1 << 'EOF'
          # Load environment variables from .env file if it exists
          if (Test-Path "./janus-bot.env") {
              $envVars = Get-Content "./janus-bot.env" | Where-Object { $_ -and -not $_.StartsWith('#') }
              foreach ($line in $envVars) {
                  $key, $value = $line -split '=', 2
                  [Environment]::SetEnvironmentVariable($key.Trim(), $value.Trim(), "Process")
              }
          }
          
          # Run the bot
          .\janus-bot.exe
          EOF

      - name: Debug - Check .env.example before artifact step
        run: |
          echo "Current directory: $(pwd)"
          echo ""
          echo "Files in current directory:"
          ls -la
          echo ""
          echo ".env.example details:"
          file .env.example
          stat .env.example
          echo ""
          echo "Content of .env.example:"
          cat .env.example

      - name: Create release artifacts
        run: |
          set +e  # Don't exit on error
          mkdir -p release-artifacts
          
          echo "Step 1: Copying janus-bot"
          cp janus-bot release-artifacts/ && echo "SUCCESS" || echo "FAILED: $?"
          
          echo "Step 2: Copying start-janus-bot.sh"
          cp start-janus-bot.sh release-artifacts/ && echo "SUCCESS" || echo "FAILED: $?"
          
          echo "Step 3: Copying start-janus-bot.ps1"
          cp start-janus-bot.ps1 release-artifacts/ && echo "SUCCESS" || echo "FAILED: $?"
          
          echo "Step 4: Copying .env.example"
          cp .env.example release-artifacts/ && echo "SUCCESS" || echo "FAILED: $?"
          
          echo "Step 5: Copying README.md"
          cp README.md release-artifacts/ && echo "SUCCESS" || echo "FAILED: $?"
          
          echo ""
          echo "=== Contents of release-artifacts after copy ==="
          ls -la release-artifacts/
          
          set -e  # Turn error checking back on

      - name: Verify .env.example in artifacts
        run: |
          echo "Checking if .env.example is in release-artifacts..."
          if [ ! -f "release-artifacts/.env.example" ]; then
            echo "ERROR: .env.example missing!"
            echo "Attempting manual copy..."
            cat .env.example > release-artifacts/.env.example
            echo "Manual copy done. Current contents:"
            ls -la release-artifacts/
            if [ -f "release-artifacts/.env.example" ]; then
              echo "SUCCESS: .env.example now exists after manual copy"
            else
              echo "FAILED: Still missing after manual copy"
              exit 1
            fi
          else
            echo "OK: .env.example is present"
            ls -la release-artifacts/.env.example
          fi

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: v${{ github.run_number }}-${{ github.sha }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
          artifacts: "release-artifacts/janus-bot,release-artifacts/start-janus-bot.sh,release-artifacts/start-janus-bot.ps1,release-artifacts/.env.example,release-artifacts/README.md"
          artifactErrorsFailBuild: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: janus-bot-build
          path: release-artifacts/
          retention-days: 30

  build-cross-platform:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
        exclude:
          # Darwin (macOS) doesn't support ARM64 on AMD64 runners for cross-compilation easily
          # Windows ARM64 is less common, exclude for now
          - os: windows
            arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26.2'

      - name: Download dependencies
        run: go mod download

      - name: Build for ${{ matrix.os }}/${{ matrix.arch }}
        run: |
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -o janus-bot-${{ matrix.os }}-${{ matrix.arch }} ./cmd/bot
        env:
          CGO_ENABLED: 0

      - name: Upload cross-platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: janus-bot-${{ matrix.os }}-${{ matrix.arch }}
          path: janus-bot-${{ matrix.os }}-${{ matrix.arch }}
          retention-days: 30

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: janus-bot-build
          path: ./release-artifacts

      - name: Verify downloaded artifacts
        run: |
          echo "=== Files in current directory ==="
          ls -la
          echo ""
          echo "=== Files in release-artifacts ==="
          ls -la release-artifacts/
          echo ""
          if [ -f "release-artifacts/.env.example" ]; then
            echo ".env.example found in release-artifacts"
            head -3 release-artifacts/.env.example
          else
            echo "ERROR: .env.example NOT FOUND in release-artifacts"
            exit 1
          fi

      - name: Install SSH client and sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-client sshpass

      - name: Create bot directory on server
        run: |
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USERNAME@$SSH_HOST "mkdir -p ~/janus-bot"
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}

      - name: Upload bot binary to server
        run: |
          sshpass -p "$SSH_PASSWORD" scp -o StrictHostKeyChecking=no -P $SSH_PORT release-artifacts/janus-bot $SSH_USERNAME@$SSH_HOST:~/janus-bot/janus-bot
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}

      - name: Upload startup scripts to server
        run: |
          sshpass -p "$SSH_PASSWORD" scp -o StrictHostKeyChecking=no -P $SSH_PORT release-artifacts/start-janus-bot.sh $SSH_USERNAME@$SSH_HOST:~/janus-bot/start-janus-bot.sh
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}

      - name: Make startup script executable
        run: |
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USERNAME@$SSH_HOST "chmod +x ~/janus-bot/start-janus-bot.sh"
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}

      - name: Create .env file on server with secrets
        run: |
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USERNAME@$SSH_HOST << 'SSH_SCRIPT'
          cat > ~/janus-bot/.env << 'EOF'
          POLYMARKET_API_KEY=${{ secrets.POLYMARKET_API_KEY }}
          POLYMARKET_PRIVATE_KEY=${{ secrets.POLYMARKET_PRIVATE_KEY }}
          MARKET_FETCH_INTERVAL_MS=${{ secrets.MARKET_FETCH_INTERVAL_MS || '5000' }}
          PAPER_TRADING_ENABLED=${{ secrets.PAPER_TRADING_ENABLED || 'true' }}
          EOF
          SSH_SCRIPT
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}

      - name: Kill existing bot screen session (if running)
        run: |
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USERNAME@$SSH_HOST "screen -S janus-bot -X quit 2>/dev/null || true"
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}

      - name: Start bot in screen session
        run: |
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USERNAME@$SSH_HOST "cd ~/janus-bot && screen -d -m -S janus-bot ./start-janus-bot.sh"
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}

      - name: Verify deployment
        run: |
          sleep 2
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USERNAME@$SSH_HOST "screen -S janus-bot -X hardcopy -h ~/janus-bot/screen.log && head -20 ~/janus-bot/screen.log"
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
